name: Add Phone Field
on:
  push:
    branches:
      - dev

jobs:
  edit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - name: Run patch script
        run: python3 patch-phone-field.py

      - name: Commit and self-clean
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git rm patch-phone-field.py
          git rm .github/workflows/add-phone-field.yml
          git add index.html
          git diff --cached --stat
          git commit -m "Add optional phone field to order popup with SMS consent" || echo "Nothing to commit"
          git push origin dev
